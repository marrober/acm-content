apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- limitrange-placement-binding.yaml
- placement.yaml
- limitrange-policy.yaml
patches:
- patch: |-
    - op: add
      path: /metadata/namespace
      value: rhacm-policies
  target:
    labelSelector: "policy=limit-range-t-shirt"
