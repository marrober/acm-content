apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: limit-range-placement-t-shirt
  labels:
    policy: limit-range-t-shirt
spec:
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
  clusterSets:
    - dev-clusters
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
          - key: environment
            operator: In
            values:
            - "dev"
            - "production"
        