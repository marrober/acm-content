apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: openshift-clusters-ossm3
  namespace: rhacm-policies
spec:
  numberOfClusters: 1
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
  clusterSets:
    - dev-clusters
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
          - key: environment
            operator: In
            values:
            - "production"
