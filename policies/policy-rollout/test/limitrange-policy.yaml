apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-limitrange-test
  labels:
    policy: limit-range-test
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-limitrange-test
        spec:
          severity: medium
          namespaceSelector:
            include: ['test-*']
          object-templates:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: v1
                kind: LimitRange
                metadata:
                  name: default-limit-range
                spec:
                  limits:
                  - type: Container
                    default:
                    {{hub- if .ManagedClusterLabels.environment "dev" -hub}}
                    cpu: '500m'
                    {{hub- else -hub}}
                    cpu: '1000m'
                      #memory: '{{ hub if eq ((index .ManagedClusterLabels "environment") "dev") "512Mi" "1024Mi") hub }}'
                    defaultRequest:
                      cpu: '300m'
                      memory: '200Mi'      
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: default-limit-range-cm
                  namespace: test-1
                data:
                  {{hub- if .ManagedClusterLabels.environment "dev" -hub}}
                  cluster-environment: "its dev !"
                  {{hub- else -hub}}
                  cluster-environment: "not dev"