apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-limitrange-test
  labels:
    policy: limit-range-test
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-limitrange-test
        spec:
          severity: medium
          namespaceSelector:
            include: ['test-*']
          object-templates_raw:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: v1
                kind: LimitRange
                metadata:
                  name: default-limit-range
                spec:
                  limits:
                  - type: Container
                    default:
                      cpu: '{{ hub if eq ((index .ManagedClusterLabels "environment") "dev" }}500m{{ hub else }} 1000m{{ hub end }}'
                      #memory: '{{ hub if eq ((index .ManagedClusterLabels "environment") "dev") "512Mi" "1024Mi") hub }}'
                    defaultRequest:
                      cpu: '300m'
                      memory: '200Mi'                    
