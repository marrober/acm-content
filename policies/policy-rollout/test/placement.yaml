apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: limit-range-placement
  labels:
    policy: limit-range
spec:
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
  clusterSets:
    - dev-clusters
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
          - key: test-first
            operator: In
            values:
            - "true"
        