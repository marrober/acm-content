apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-limitrange
  labels:
    policy: limit-range
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-limitrange
        spec:
          severity: medium
          namespaceSelector:
            include: ['test-*']
          object-templates:
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: v1
                kind: LimitRange
                metadata:
                  name: default-limit-range
                spec:
                  limits:
                  - type: Container
                    default:
                      cpu: '{{hub- if eq .ManagedClusterLabels.environment "dev" -hub}}500m{{hub- else -hub}}1000m{{hub- end -hub}}'
                      memory: '{{hub- if eq .ManagedClusterLabels.environment "dev" -hub}}400Mi{{hub- else -hub}}2000Mi{{hub- end -hub}}'
                    defaultRequest:
                      cpu: '300m'
                      memory: '200Mi'      
            - complianceType: musthave
              recreateOption: IfRequired
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: default-limit-range-cm
                  namespace: test-1
                data:
                  cluster-environment: '{{hub- if eq .ManagedClusterLabels.environment "dev" -hub}}its dev !{{hub- else -hub}}Careful! this is production{{hub- end -hub}}'