apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-management
  namespace: openshift-gitops
spec:
  project: default
  destination:
    namespace: rhacm-policies
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: argoproj.io
    jsonPointers:
    - /status
    kind: Application
  - group: triggers.tekton.dev
    jsonPointers:
    - /status
    kind: EventListener
  - group: triggers.tekton.dev
    jsonPointers:
    - /status
    kind: TriggerTemplate
  - group: triggers.tekton.dev
    jsonPointers:
    - /status
    kind: TriggerBinding
  - group: route.openshift.io
    jsonPointers:
    - /spec/host
    kind: Route
  source:
    path: policies/policy-set/gitops
    targetRevision: main
    repoURL: https://github.com/marrober/acm-content.git
  syncPolicy:
    automated: 
      prune: true 
      selfHeal: true 
      allowEmpty: false 
    syncOptions:     
    - Validate=true 
    - CreateNamespace=false 
    - PrunePropagationPolicy=foreground
    - PruneLast=true 
    retry:
      limit: 1 
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 20s 
