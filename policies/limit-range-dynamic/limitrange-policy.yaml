apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-limitrange-dynamic
  labels:
    policy: limit-range-dynamic
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-limitrange-dynamic
        spec:
          severity: medium
          namespaceSelector:
            include:
            - 'test-*'
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: LimitRange
                metadata:
                  name: default-limit-range-d
                spec:
                  limits:
                  - type: Container
                    default:
                      cpu: 500m
                      memory: 512Mi
                    defaultRequest:
                      cpu: 50m
                      memory: 256Mi
                    max:
                      cpu: 2
                      memory: 4Gi
