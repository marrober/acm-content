apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: pull-request-secrets
  namespace: rhacm-policies
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: pull-request-secrets
        spec:
          evaluationInterval:
            compliant: 60s
            noncompliant: 60s
          remediationAction: inform 
          severity: low
          object-templates-raw: |
            {{- $foundSecrets := dict -}}
            {{- range (lookup "v1" "Namespace" "" "").items }}
              {{- $nsName := .metadata.name -}}
              {{- $skipNamespace := false -}}
              {{- range (list "installer" "devspaces" "default" "hive" "-system" "hypershift" "kube-" "-cluster" "multicluster" "open-cluster" "openshift" "rhacs" "stackrox" "trusted-" "rhacm-" ) -}}
                {{- if contains . $nsName }} {{ $skipNamespace = true }} {{ end -}}
              {{- end -}}
              {{- if not $skipNamespace }}
                {{- range $pod := (lookup "v1" "Pod" $nsName "").items }}
                  {{- $podName := $pod.metadata.name -}}
                  {{- if $pod.spec.imagePullSecrets }}   
                    {{- range $secret := $pod.spec.imagePullSecrets }}
                      {{- $secretObj := (lookup "v1" "Secret" $nsName $secret.name) -}} 
                      {{- $created := toDate "2006-01-02T15:04:05Z" $secretObj.metadata.creationTimestamp -}}
                      {{- $key := printf "%s/%s" $nsName $secretObj.metadata.name -}}
                      {{- $_ := set $foundSecrets $key (dict "ns" $nsName "name" $secretObj.metadata.name "created" $created) -}}
                    {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}

            {{- range $key, $val := $foundSecrets }}
              {{- $now := now -}}
              {{- if (gt (sub (toInt $now.Unix) (toInt $val.created.Unix)) 23668200  ) }}
              - complianceType: mustnothave
                objectDefinition:
                  kind: Secret
                  apiVersion: v1
                  metadata:
                    name: {{ $val.name | quote }}
                    namespace: {{ $val.ns | quote }}
              {{- end }}
            {{- end }}